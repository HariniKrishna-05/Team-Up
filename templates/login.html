{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affda;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(110px);
    pointer-events: none;
    z-index: 0;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 460px; height: 460px;
    background: var(--accent);
    opacity: 0.07;
    top: -100px; right: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 380px; height: 380px;
    background: var(--accent2);
    opacity: 0.06;
    bottom: -60px; left: -80px;
    animation-delay: -5s;
  }
  .orb-3 {
    width: 260px; height: 260px;
    background: var(--accent3);
    opacity: 0.05;
    top: 40%; left: 55%;
    animation-delay: -10s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(24px, 18px) scale(1.06); }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.22;
    z-index: 0;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    border-radius: 20px 20px 0 0;
  }

  /* ── LOGO ── */
  .card-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── HEADING ── */
  .card-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1.15;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    font-weight: 300;
  }

  /* ── FORM ── */
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    animation: fadeUp 0.5s ease both;
  }
  .field-group:nth-child(1) { animation-delay: 0.1s; }
  .field-group:nth-child(2) { animation-delay: 0.18s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-muted);
    pointer-events: none;
    transition: stroke 0.2s;
  }
  .field-wrap:focus-within .field-icon { stroke: var(--accent); }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 13px 14px 13px 42px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent)20;
  }

  /* Password field */
  .field-wrap--pw input { padding-right: 44px; }
  .pw-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    display: grid; place-items: center;
    color: var(--text-muted);
    padding: 4px;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--accent); }
  .pw-toggle svg { width: 16px; height: 16px; stroke: currentColor; }

  /* Forgot password row */
  .field-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .forgot-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .forgot-link:hover { opacity: 0.75; }

  /* Remember me */
  .remember-row {
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.5s ease 0.24s both;
  }
  .custom-check {
    width: 18px; height: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .custom-check input { display: none; }
  .custom-check svg {
    width: 11px; height: 11px;
    stroke: #fff;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .custom-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .custom-check.checked svg { opacity: 1; }
  .remember-label {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 6px;
    animation: fadeUp 0.5s ease 0.3s both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent)40; }
  .submit-btn:hover::before { opacity: 1; }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn span, .submit-btn svg { position: relative; z-index: 1; }
  .submit-btn svg { width: 16px; height: 16px; stroke: #fff; flex-shrink: 0; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 18px;
    animation: fadeUp 0.5s ease 0.35s both;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* Signup link */
  .signup-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    animation: fadeUp 0.5s ease 0.4s both;
  }
  .signup-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .signup-link a:hover { border-color: var(--accent); }

  /* Stats strip */
  .stats-strip {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.45s both;
  }
  .strip-item {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .strip-item:last-child { border-right: none; }
  .strip-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .strip-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  @media (max-width: 500px) {
    .login-card { padding: 28px 22px; }
    .card-heading { font-size: 22px; }
  }
</style>

<!-- BG orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TeamUp</div>
    </div>

    <!-- Heading -->
    <div class="card-heading">Welcome back</div>
    <div class="card-sub">Sign in to your workspace and keep building.</div>

    <!-- Form -->
    <form method="POST" class="form-grid" autocomplete="off">
      

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <div class="field-wrap">
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
          <svg class="field-icon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <div class="field-header">
          <label class="field-label" for="password">Password</label>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <div class="field-wrap field-wrap--pw">
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <svg class="field-icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
            <svg id="eyeIcon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- Remember me -->
      <!-- <div class="remember-row">
        <div class="custom-check" id="rememberCheck" onclick="toggleCheck(this)">
          <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <span class="remember-label" onclick="toggleCheck(document.getElementById('rememberCheck'))">Keep me signed in</span>
      </div> -->

      <!-- Submit -->
      <button type="submit" class="submit-btn">
        <span>Login</span>
        <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>
    </form>

    <!-- Signup -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">New to TeamUp?</div>
      <div class="divider-line"></div>
    </div>
    <div class="signup-link">
      <a href="/signup">Create a new account →</a>
    </div>

    <!-- Stats strip -->
    

  </div>
</div>

<script>
  function togglePw() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }
  }

  function toggleCheck(el) {
    el.classList.toggle('checked');
  }
</script>

{% endblock %}
