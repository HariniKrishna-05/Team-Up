{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affda;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(110px);
    pointer-events: none;
    z-index: 0;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 420px; height: 420px;
    background: var(--accent);
    opacity: 0.07;
    bottom: -80px; left: -80px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 360px; height: 360px;
    background: var(--accent2);
    opacity: 0.06;
    top: -60px; right: -60px;
    animation-delay: -6s;
  }
  .orb-3 {
    width: 240px; height: 240px;
    background: var(--accent3);
    opacity: 0.05;
    top: 55%; left: 60%;
    animation-delay: -11s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(26px, 18px) scale(1.06); }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.22;
    z-index: 0;
    pointer-events: none;
  }

  /* ── CARD ── */
  .fp-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .fp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .fp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    border-radius: 20px 20px 0 0;
  }

  /* ── LOGO ── */
  .card-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── ICON HERO ── */
  .icon-hero {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent)22, var(--accent2)11);
    border: 1px solid var(--accent)33;
    border-radius: 18px;
    display: grid; place-items: center;
    margin-bottom: 20px;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  .icon-hero svg { width: 28px; height: 28px; stroke: var(--accent); }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent)00; }
    50%       { box-shadow: 0 0 0 8px var(--accent)12; }
  }

  /* ── HEADING ── */
  .card-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1.15;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* ── FORM ── */
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    animation: fadeUp 0.5s ease 0.1s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-muted);
    pointer-events: none;
    transition: stroke 0.2s;
  }
  .field-wrap:focus-within .field-icon { stroke: var(--accent); }

  /* ── INPUT — name="email", type="email" preserved ── */
  input[type="email"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 13px 14px 13px 42px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    -webkit-appearance: none;
  }
  input[type="email"]::placeholder { color: var(--text-muted); }
  input[type="email"]:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent)20;
  }

  /* ── SUBMIT — original text "Send OTP" preserved ── */
  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.18s both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button[type="submit"]::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    opacity: 0;
    transition: opacity 0.3s;
  }
  button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent)40; }
  button[type="submit"]:hover::before { opacity: 1; }
  button[type="submit"]:active { transform: translateY(0); }
  button[type="submit"] span { position: relative; z-index: 1; }
  .btn-icon { position: relative; z-index: 1; width: 16px; height: 16px; stroke: #fff; flex-shrink: 0; }

  /* ── BACK LINK — href="/login" preserved ── */
  .back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
    animation: fadeUp 0.5s ease 0.26s both;
  }
  .back-link svg { width: 14px; height: 14px; stroke: currentColor; flex-shrink: 0; }
  .back-link:hover { color: var(--accent); }

  @media (max-width: 500px) {
    .fp-card { padding: 28px 20px; }
    .card-heading { font-size: 22px; }
  }
</style>

<!-- BG orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="fp-wrap">
  <div class="fp-card">

    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TeamUp</div>
    </div>

    <!-- Icon hero -->
    <div class="icon-hero">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
    </div>

    <!-- ✅ h2 text preserved as styled heading -->
    <div class="card-heading">Forgot Password</div>
    <div class="card-sub">Enter your registered email and we'll send you a one-time code.</div>

    <!-- ✅ ORIGINAL FORM — method, name, type, placeholder, required all unchanged -->
    <form method="POST" class="form-grid">
      

      <div class="field-group">
        <label class="field-label" for="email">Registered Email</label>
        <div class="field-wrap">
          <input type="email" name="email" id="email" placeholder="Registered email" required>
          <svg class="field-icon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
      </div>

      <!-- ✅ button text "Send OTP" preserved -->
      <button type="submit">
        <span>Send OTP</span>
        <svg class="btn-icon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </form>

    <!-- ✅ href="/login" preserved -->
    <a href="/login" class="back-link">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Back to login
    </a>

  </div>
</div>

{% endblock %}
