{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affda;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(110px);
    pointer-events: none;
    z-index: 0;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 420px; height: 420px;
    background: var(--accent3);
    opacity: 0.07;
    top: -80px; right: -80px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 360px; height: 360px;
    background: var(--accent);
    opacity: 0.06;
    bottom: -60px; left: -60px;
    animation-delay: -5s;
  }
  .orb-3 {
    width: 240px; height: 240px;
    background: var(--accent2);
    opacity: 0.05;
    top: 55%; left: 58%;
    animation-delay: -9s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(22px, 16px) scale(1.06); }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.22;
    z-index: 0;
    pointer-events: none;
  }

  /* ── CARD ── */
  .rp-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .rp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .rp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    border-radius: 20px 20px 0 0;
  }

  /* ── LOGO ── */
  .card-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── ICON HERO ── */
  .icon-hero {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent3)22, var(--accent)11);
    border: 1px solid var(--accent3)44;
    border-radius: 18px;
    display: grid; place-items: center;
    margin-bottom: 20px;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  .icon-hero svg { width: 28px; height: 28px; stroke: var(--accent3); }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent3)00; }
    50%       { box-shadow: 0 0 0 8px var(--accent3)14; }
  }

  /* ── HEADING ── */
  .card-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1.15;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* ── FORM ── */
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    animation: fadeUp 0.5s ease both;
  }
  .field-group:nth-child(1) { animation-delay: 0.08s; }
  .field-group:nth-child(2) { animation-delay: 0.16s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-muted);
    pointer-events: none;
    transition: stroke 0.2s;
  }
  .field-wrap:focus-within .field-icon { stroke: var(--accent); }

  /* ── INPUTS — original name/type preserved ── */
  input[name="otp"],
  input[name="new_password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 13px 14px 13px 42px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    -webkit-appearance: none;
  }
  input[name="otp"]::placeholder,
  input[name="new_password"]::placeholder { color: var(--text-muted); }

  input[name="otp"]:focus,
  input[name="new_password"]:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent)20;
  }

  /* password field needs room for toggle */
  .field-wrap--pw input { padding-right: 44px; }
  .pw-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    display: grid; place-items: center;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--accent); }
  .pw-toggle svg { width: 16px; height: 16px; stroke: currentColor; }

  /* ── SUBMIT — original type/text preserved ── */
  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.24s both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button[type="submit"]::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    opacity: 0;
    transition: opacity 0.3s;
  }
  button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent3)30; }
  button[type="submit"]:hover::before { opacity: 1; }
  button[type="submit"]:active { transform: translateY(0); }
  button[type="submit"] span { position: relative; z-index: 1; }
  .btn-icon { position: relative; z-index: 1; width: 16px; height: 16px; stroke: #fff; flex-shrink: 0; }

  /* ── STEPS ── */
  .steps {
    display: flex;
    margin-top: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.3s both;
  }
  .step {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .step:last-child { border-right: none; }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 11px;
    display: grid; place-items: center;
    margin: 0 auto 6px;
    color: var(--text-muted);
  }
  .step.done .step-num { background: var(--accent3)33; color: var(--accent3); }
  .step.active .step-num { background: linear-gradient(135deg, var(--accent3), var(--accent)); color: #fff; }
  .step-label { font-size: 10px; color: var(--text-muted); }
  .step.active .step-label { color: var(--accent3); font-weight: 600; }
  .step.done .step-label { color: var(--accent3); }

  @media (max-width: 500px) {
    .rp-card { padding: 28px 20px; }
    .card-heading { font-size: 22px; }
  }
</style>

<!-- BG orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="rp-wrap">
  <div class="rp-card">

    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TeamUp</div>
    </div>

    <!-- Icon hero -->
    <div class="icon-hero">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>

    <div class="card-heading">Reset Password</div>
    <div class="card-sub">Confirm your OTP and set a strong new password for your account.</div>

    <!-- ✅ ORIGINAL FORM LOGIC — unchanged method, names, types, action -->
    <form method="POST" class="form-grid">
      

      <!-- OTP field — name="otp" preserved -->
      <div class="field-group">
        <label class="field-label" for="otp">OTP</label>
        <div class="field-wrap">
          <input type="text" name="otp" id="otp" placeholder="OTP" required>
          <svg class="field-icon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
      </div>

      <!-- Password field — name="new_password" preserved -->
      <div class="field-group">
        <label class="field-label" for="new_password">New Password</label>
        <div class="field-wrap field-wrap--pw">
          <input type="password" name="new_password" id="new_password" placeholder="New password" required>
          <svg class="field-icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
            <svg id="eyeIcon" fill="none" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit — original text "Reset" preserved -->
      <button type="submit">
        <span>Reset</span>
        <svg class="btn-icon" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </button>
    </form>

    <!-- Steps indicator -->
    <div class="steps">
      <div class="step done">
        <div class="step-num">✓</div>
        <div class="step-label">Email Sent</div>
      </div>
      <div class="step done">
        <div class="step-num">✓</div>
        <div class="step-label">OTP Verified</div>
      </div>
      <div class="step active">
        <div class="step-num">3</div>
        <div class="step-label">New Password</div>
      </div>
    </div>

  </div>
</div>

<script>
  function togglePw() {
    const input = document.getElementById('new_password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }
  }
</script>

{% endblock %}
