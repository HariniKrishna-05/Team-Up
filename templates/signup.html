{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affda;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
    position: relative;
  }

  /* ── BACKGROUND ORBS ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); opacity: 0.07; top: -120px; left: -120px; }
  .orb-2 { width: 400px; height: 400px; background: var(--accent2); opacity: 0.06; bottom: -80px; right: -80px; }
  .orb-3 { width: 300px; height: 300px; background: var(--accent3); opacity: 0.05; top: 50%; left: 60%; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px,20px) scale(1.05); }
  }

  /* ── CARD ── */
  .signup-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .signup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 35px;
    position: relative;
    overflow: hidden;
  }

  .signup-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    border-radius: 20px 20px 0 0;
  }

  /* ── LOGO ── */
  .card-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── HEADINGS ── */
  .card-heading {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 30px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* ── FORM ── */
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* staggered field animation */
  .form-grid > div {
    animation: fadeUp 0.5s ease both;
  }
  .form-grid > div:nth-child(1) { animation-delay: 0.08s; }
  .form-grid > div:nth-child(2) { animation-delay: 0.14s; }
  .form-grid > div:nth-child(3) { animation-delay: 0.20s; }
  .form-grid > div:nth-child(4) { animation-delay: 0.26s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 7px;
    display: block;
  }

  /* ── FIELD WRAP + ICON ── */
  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-muted);
    pointer-events: none;
    transition: stroke 0.2s;
    fill: none;
    
  }
  .field-wrap:focus-within .field-icon { stroke: var(--accent); }

  /* ── INPUTS — FIXED: padding-left set to 46px so text clears the icon ── */
  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 13px 14px 13px 40px;  /* ← FIXED: was 150px, now 46px */
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.13);
  }

  /* password eye toggle */
  .pw-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    display: grid; place-items: center;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--accent); }
  .pw-toggle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
  .field-wrap--pw input { padding-right: 44px; }

  /* ── SUBMIT ── */
  .submit-btn {
    width: 100%;
    margin-top: 6px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    animation: fadeUp 0.5s ease 0.32s both;
  }
  .submit-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,106,255,0.3); }
  .submit-btn:hover::before { opacity: 1; }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn span, .submit-btn svg { position: relative; z-index: 1; }
  .submit-btn svg { width: 16px; height: 16px; stroke: #fff; flex-shrink: 0; }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 18px;
    animation: fadeUp 0.5s ease 0.38s both;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* ── LOGIN LINK ── */
  .login-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    animation: fadeUp 0.5s ease 0.44s both;
  }
  .login-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .login-link a:hover { border-color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body { align-items: flex-start; padding-top: 40px; }
    .signup-card { padding: 28px 20px; }
    .card-heading { font-size: 22px; }
    input { font-size: 13px; }
  }
</style>

<!-- BG orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="signup-wrap">
  <div class="signup-card">

    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TeamUp</div>
    </div>

    <div class="card-heading">Create your account</div>
    <div class="card-sub">Join thousands of developers building & competing together.</div>

    <form method="POST" class="form-grid">
      

      <!-- Full Name -->
      <div>
        <label class="field-label">Full Name</label>
        <div class="field-wrap">
          <input type="text" name="name" placeholder="Enter your full name" required>
          <svg class="field-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
      </div>

      <!-- Email Address -->
      <div>
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <input type="email" name="email" placeholder="Enter your email address" required>
          <svg class="field-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
      </div>

      <!-- Institution -->
      <div>
        <label class="field-label">Institution</label>
        <div class="field-wrap">
          <input type="text" name="institution" placeholder="Enter your institution name" required>
          <svg class="field-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="field-label">Password</label>
        <div class="field-wrap field-wrap--pw">
          <input type="password" name="password" placeholder="Enter your password" required>
          <!-- <svg class="field-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11V7a5 5 0 0110 0v4"/></svg> -->
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <span>Create Account</span>
        <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>

    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Already a member?</div>
      <div class="divider-line"></div>
    </div>
    <div class="login-link">
      <a href="/login">Login to your account →</a>
    </div>

  </div>
</div>

<script>
  function togglePw() {
    const input = document.querySelector('input[name="password"]');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }
  }
</script>

{% endblock %}
